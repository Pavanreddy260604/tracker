version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: learning-os_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  redis:
    image: redis:7-alpine
    container_name: learning-os_redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build: ./backend
    container_name: learning-os_backend
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/learning-os}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER:-learning-os}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - FRONTEND_URL=http://localhost:5173
    env_file:
      - .env
    depends_on:
      - mongo
    restart: always

  frontend:
    build: ./frontend
    container_name: learning-os_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongo_data:
