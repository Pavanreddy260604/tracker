version: '3.8'

services:
  backend:
    build: ./backend
    container_name: learning-os_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost:5173
    env_file:
      - .env
    restart: always

  frontend:
    build: ./frontend
    container_name: learning-os_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always
